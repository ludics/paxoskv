syntax = "proto3";

option go_package = "github.com/ludics/paxoskv/src";

package paxoskv;

service PaxosKV {
  rpc Prepare (Proposer) returns (Acceptor) {}
  rpc Accept (Proposer) returns (Acceptor) {}
}

message BallotNum {
  int64 N = 1;
  int64 ProposerId = 2;
}

message Value {
  bytes Data = 1;
}

message PaxosInstanceId {
  string Key = 1;
  int64 Version = 2;
}

message Acceptor {
  BallotNum LastBallot = 1;
  Value Val = 2;
  BallotNum VBallot = 3;
}

message Proposer {
  PaxosInstanceId InstanceId = 1;
  BallotNum Ballot = 2;
  Value Val = 3;
}
